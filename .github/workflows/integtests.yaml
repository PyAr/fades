name: Integration Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  archlinux:
    runs-on: ubuntu-latest
    container:
      # Use https://github.com/gilgamezh/archlinux-python39 to save the python build time
      image: gilgamezh/archlinux-python39:latest
      volumes:
        - ${{ github.workspace }}:/fades
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          pacman -Suy --noconfirm python3 python-packaging
      - name: Simple fades run
        run: |
          cd /fades
          bin/fades -v -d pytest -x pytest --version
      - name: Using a different Python
        run: |
          python bin/fades -v --python=python3.9 -d pytest -x pytest -v --integtest-pyversion=3.9 tests/integtest.py

  fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      volumes:
        - ${{ github.workspace }}:/fades
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          yum install --assumeyes python3.14 python-packaging
      - name: Simple fades run
        run: |
          cd /fades
          bin/fades -v -d pytest -x pytest --version
      - name: Using a different Python
        run: |
          yum install --assumeyes python3.13
          cd /fades
          python3.14 bin/fades -v --python=python3.13 -d pytest -x pytest -v --integtest-pyversion=3.13 tests/integtest.py

  native-windows:
    strategy:
      matrix:
        # just a selection otherwise it's too much
        # - latest OS (left here even if it's only one to simplify upgrading later)
        # - oldest and newest Python
        os: [windows-2025]
        python-version: ["3.10", "3.15"]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }} on ${{ matrix.os }}
        uses: actions/setup-python@v5
        id: matrixpy
        with:
          python-version: ${{ matrix.python-version }}

      - name: Also set up Python 3.13 for cross-Python test
        uses: actions/setup-python@v5
        id: otherpy
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          ${{ steps.matrixpy.outputs.python-path }} -m pip install -U packaging
      - name: Simple fades run
        run: |
          ${{ steps.matrixpy.outputs.python-path }} bin/fades -v -d pytest -x pytest --version

      - name: Using a different Python
        run: |
          ${{ steps.matrixpy.outputs.python-path }} bin/fades -v --python=${{ steps.otherpy.outputs.python-path }} -d pytest -x pytest -v --integtest-pyversion=3.13 tests/integtest.py

  native-generic:
    strategy:
      matrix:
        # just a selection otherwise it's too much
        # - latest OSes
        # - oldest and newest Python
        os: [ubuntu-26.04, macos-15]
        python-version: ["3.10", "3.14"]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }} on ${{ matrix.os }}
        uses: actions/setup-python@v5
        id: matrixpy
        with:
          python-version: ${{ matrix.python-version }}

      - name: Also set up Python 3.13 for cross-Python test
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          ${{ steps.matrixpy.outputs.python-path }} -m pip install -U packaging
      - name: Simple fades run
        run: |
          ${{ steps.matrixpy.outputs.python-path }} bin/fades -v -d pytest -x pytest --version

      - name: Using a different Python
        run: |
          ${{ steps.matrixpy.outputs.python-path }} bin/fades -v --python=python3.13 -d pytest -x pytest -v --integtest-pyversion=3.13 tests/integtest.py
